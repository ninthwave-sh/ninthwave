name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    uses: ./.github/workflows/test.yml

  gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [test]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.test.result }}" == "failure" || "${{ needs.test.result }}" == "cancelled" ]]; then
            echo "::error::CI failed -- test=${{ needs.test.result }}"
            exit 1
          fi
          echo "CI passed -- test=${{ needs.test.result }}"
